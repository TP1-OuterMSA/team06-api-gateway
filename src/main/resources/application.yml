spring:
  application:
    name: team06-api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: team06-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/team6/**
          filters:
            - name: JwtAuthentication

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/user/**

jwt:
  secret: f336280f7fb039ab6abaa5e7b9c3c80c8605c50acc988236e376ca3f7cca0bd7
  protected-paths:
    - /api/team6/user